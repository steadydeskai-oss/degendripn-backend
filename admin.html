<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DegenDrip Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a10;color:#e0e0e0;min-height:100vh}
a{color:#60b0ff}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:36px 40px;width:340px}
.login-box h1{font-size:20px;margin-bottom:6px;color:#fff}
.login-box p{font-size:13px;color:#888;margin-bottom:24px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #2a2a3a;border-radius:7px;background:#111;color:#fff;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#4a7fff}
#login-error{color:#ff7070;font-size:12px;margin-top:8px;display:none}

/* ── Buttons ── */
.btn{display:inline-block;padding:9px 18px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;text-align:center}
.btn:hover{opacity:.85}
.btn-primary{background:#4a7fff;color:#fff;width:100%}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-approve{background:#14532d;color:#4ade80;border:1px solid #166534;font-size:13px;font-weight:700;padding:11px 22px;border-radius:8px;cursor:pointer;transition:background .15s}
.btn-approve:hover{background:#166534}
.btn-reject{background:#450a0a;color:#f87171;border:1px solid #7f1d1d;font-size:13px;font-weight:700;padding:11px 22px;border-radius:8px;cursor:pointer;transition:background .15s}
.btn-reject:hover{background:#7f1d1d}
.btn-approve:disabled,.btn-reject:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid #333;color:#aaa;cursor:pointer;padding:6px 14px;border-radius:6px;font-size:12px}
.btn-ghost:hover{border-color:#555;color:#ccc}

/* ── Main layout ── */
#main-screen{display:none;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1e1e2a;background:#0f0f18;flex-shrink:0}
.top-bar-left{display:flex;align-items:center;gap:16px}
.top-bar h1{font-size:17px;font-weight:700;color:#fff}
.top-bar-right{display:flex;align-items:center;gap:10px}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;padding:0 20px;background:#0f0f18;border-bottom:1px solid #1e1e2a;flex-shrink:0}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;user-select:none}
.tab:hover{color:#aaa}
.tab.active{color:#fff;border-color:#4a7fff}
.tab-count{display:inline-block;background:#2a2a3a;color:#888;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px;min-width:18px;text-align:center}
.tab.active .tab-count{background:#4a7fff33;color:#7ab0ff}

/* ── Split pane ── */
.pane-wrap{display:flex;flex:1;overflow:hidden}

/* ── Order list ── */
.order-list{width:380px;flex-shrink:0;border-right:1px solid #1e1e2a;overflow-y:auto;background:#0d0d16}
.order-list-empty{padding:48px 24px;text-align:center;color:#444;font-size:14px}
.order-row{padding:14px 16px;border-bottom:1px solid #161620;cursor:pointer;transition:background .1s}
.order-row:hover{background:#13131e}
.order-row.selected{background:#141428;border-left:2px solid #4a7fff}
.order-row:not(.selected){border-left:2px solid transparent}
.or-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.or-email{font-size:13px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.or-date{font-size:11px;color:#555;flex-shrink:0}
.or-id{font-size:11px;font-family:monospace;color:#555;margin-bottom:5px}
.or-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.or-total{font-size:12px;color:#888}
.or-items{font-size:12px;color:#666}

/* ── Status pills ── */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.pill-pending_review{background:#2a2010;color:#fbbf24;border:1px solid #4a3a10}
.pill-in_production{background:#0f2a1a;color:#4ade80;border:1px solid #16532d}
.pill-rejected{background:#2a1010;color:#f87171;border:1px solid #5a1a1a}
.pill-shipped{background:#0f1f3a;color:#60b0ff;border:1px solid #1a3a6a}
.flag-badge{background:#2a1010;color:#f87171;border:1px solid #5a1a1a;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}

/* ── Order detail ── */
.order-detail{flex:1;overflow-y:auto;background:#0d0d16}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#333;font-size:15px}
.detail-inner{padding:24px 28px;max-width:860px}

.section{margin-bottom:28px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;font-weight:600;margin-bottom:12px}

.detail-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #1a1a28}
.detail-id{font-family:monospace;font-size:15px;color:#888;margin-bottom:6px}
.detail-status{margin-bottom:6px}
.detail-date{font-size:12px;color:#555}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-cell{background:#131320;border:1px solid #1e1e2c;border-radius:8px;padding:12px 14px}
.info-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-val{font-size:13px;color:#ccc;line-height:1.5}

/* ── Item cards ── */
.item-card{background:#131320;border:1px solid #1e1e2c;border-radius:10px;padding:16px;margin-bottom:12px}
.item-top{display:flex;gap:16px}
.item-design{width:120px;height:120px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#0a0a14;border:1px solid #1e1e2c;display:flex;align-items:center;justify-content:center}
.item-design img{width:100%;height:100%;object-fit:contain}
.item-design-placeholder{color:#333;font-size:11px;text-align:center;padding:8px}
.item-meta{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:600;color:#ddd;margin-bottom:6px}
.item-attrs{font-size:12px;color:#888;margin-bottom:8px;line-height:1.6}
.item-price{font-size:14px;color:#aaa;font-weight:600}
.item-texts{margin-top:10px;border-top:1px solid #1e1e2c;padding-top:10px}
.item-texts-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:6px}
.text-chip{display:inline-block;background:#1a1a2c;border:1px solid #2a2a40;border-radius:5px;padding:3px 8px;font-size:12px;color:#aaa;margin:2px 4px 2px 0}

/* ── Moderation flags ── */
.flag-card{background:#1e1010;border:1px solid #3a1a1a;border-radius:8px;padding:12px 14px;margin-bottom:8px}
.flag-text{color:#ff9090;font-weight:600;font-size:13px;margin-bottom:4px;word-break:break-word}
.flag-detail{font-size:11px;color:#885555}
.flag-cat{display:inline-block;background:#3a1a1a;color:#ff7070;font-size:10px;font-family:monospace;padding:1px 6px;border-radius:4px;margin-right:6px}

/* ── Actions ── */
.action-bar{background:#131320;border:1px solid #1e1e2c;border-radius:10px;padding:18px 20px;margin-top:8px}
.action-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.reject-form{margin-top:14px;display:none}
.reject-form textarea{width:100%;background:#0d0d16;border:1px solid #3a1a1a;border-radius:7px;color:#e0e0e0;padding:10px 12px;font-size:13px;resize:vertical;min-height:70px;font-family:inherit;outline:none}
.reject-form textarea:focus{border-color:#f87171}
.reject-form textarea::placeholder{color:#555}
.reject-form-btns{display:flex;gap:8px;margin-top:10px}
.action-result{margin-top:12px;padding:10px 14px;border-radius:7px;font-size:13px}
.action-result.success{background:#0f2a1a;color:#4ade80;border:1px solid #166534}
.action-result.error{background:#2a1010;color:#f87171;border:1px solid #7f1d1d}

/* ── Timestamps ── */
.ts-row{display:flex;gap:6px;font-size:12px;color:#555;margin-bottom:4px}
.ts-label{color:#444;min-width:90px}
.ts-val{color:#666}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0a10}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}

@media(max-width:700px){
  .order-list{width:100%;border-right:none;border-bottom:1px solid #1e1e2a}
  .pane-wrap{flex-direction:column}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>DegenDrip Admin</h1>
    <p>Order review dashboard</p>
    <input type="password" id="pw-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
    <div id="login-error">Incorrect password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="main-screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <h1>DegenDrip Admin</h1>
      <span id="refresh-status" style="font-size:11px;color:#444"></span>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-ghost btn-sm" onclick="loadOrders()">↻ Refresh</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-status="pending_review" onclick="switchTab(this)">
      Pending Review <span class="tab-count" id="cnt-pending_review">0</span>
    </div>
    <div class="tab" data-status="in_production" onclick="switchTab(this)">
      In Production <span class="tab-count" id="cnt-in_production">0</span>
    </div>
    <div class="tab" data-status="rejected" onclick="switchTab(this)">
      Rejected <span class="tab-count" id="cnt-rejected">0</span>
    </div>
    <div class="tab" data-status="shipped" onclick="switchTab(this)">
      Shipped <span class="tab-count" id="cnt-shipped">0</span>
    </div>
    <div class="tab" data-status="" onclick="switchTab(this)">
      All <span class="tab-count" id="cnt-all">0</span>
    </div>
  </div>

  <div class="pane-wrap">
    <div class="order-list" id="order-list">
      <div class="order-list-empty">Loading…</div>
    </div>
    <div class="order-detail" id="order-detail">
      <div class="detail-empty">Select an order to review</div>
    </div>
  </div>
</div>

<script>
const API = 'https://degendripn-backend-production.up.railway.app';
let password = '';
let allOrders = [];
let currentTab = 'pending_review';
let selectedOrderId = null;
let refreshTimer = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  password = pw;
  sessionStorage.setItem('admin_pw', pw);
  loadOrders();
}

function logout() {
  sessionStorage.removeItem('admin_pw');
  password = '';
  clearInterval(refreshTimer);
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const res = await fetch(`${API}/api/admin/orders`, {
      headers: { Authorization: `Bearer ${password}` },
    });
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    if (!res.ok) throw new Error('Server error ' + res.status);

    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    document.getElementById('main-screen').style.flexDirection = 'column';

    allOrders = await res.json();
    updateCounts();
    renderList();
    startRefreshTimer();
  } catch (e) {
    document.getElementById('order-list').innerHTML =
      `<div class="order-list-empty" style="color:#f87171">Error: ${esc(e.message)}</div>`;
  }
}

function startRefreshTimer() {
  clearInterval(refreshTimer);
  let countdown = 60;
  const el = document.getElementById('refresh-status');
  refreshTimer = setInterval(() => {
    countdown--;
    if (el) el.textContent = `Auto-refresh in ${countdown}s`;
    if (countdown <= 0) loadOrders();
  }, 1000);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.status;
  selectedOrderId = null;
  renderList();
  document.getElementById('order-detail').innerHTML = '<div class="detail-empty">Select an order to review</div>';
}

function updateCounts() {
  const counts = { pending_review: 0, in_production: 0, rejected: 0, shipped: 0, '': allOrders.length };
  for (const o of allOrders) { if (counts[o.status] !== undefined) counts[o.status]++; }
  document.getElementById('cnt-pending_review').textContent = counts.pending_review;
  document.getElementById('cnt-in_production').textContent  = counts.in_production;
  document.getElementById('cnt-rejected').textContent       = counts.rejected;
  document.getElementById('cnt-shipped').textContent        = counts.shipped;
  document.getElementById('cnt-all').textContent            = counts[''];
}

// ── Order list ────────────────────────────────────────────────────────────────
function renderList() {
  const filtered = currentTab
    ? allOrders.filter(o => o.status === currentTab)
    : allOrders;

  const el = document.getElementById('order-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="order-list-empty">No orders here</div>';
    return;
  }

  el.innerHTML = filtered.map(o => {
    const isSelected = o.orderId === selectedOrderId;
    const date       = fmtDate(o.createdAt);
    const flagBadge  = o.moderationFlags?.length
      ? `<span class="flag-badge">⚑ ${o.moderationFlags.length}</span>` : '';
    return `<div class="order-row${isSelected ? ' selected' : ''}" onclick="selectOrder('${esc(o.orderId)}')">
      <div class="or-top">
        <span class="or-email">${esc(o.customerEmail || '—')}</span>
        <span class="or-date">${esc(date)}</span>
      </div>
      <div class="or-id">${esc(o.orderId)}</div>
      <div class="or-meta">
        <span class="${statusPillClass(o.status)}">${statusLabel(o.status)}</span>
        <span class="or-total">$${(o.total || 0).toFixed(2)}</span>
        <span class="or-items">${o.items?.length || 0} item${(o.items?.length || 0) !== 1 ? 's' : ''}</span>
        ${flagBadge}
      </div>
    </div>`;
  }).join('');
}

// ── Order detail ──────────────────────────────────────────────────────────────
function selectOrder(orderId) {
  selectedOrderId = orderId;
  renderList(); // re-render list to show selection highlight
  const order = allOrders.find(o => o.orderId === orderId);
  if (!order) return;
  renderDetail(order);
}

function renderDetail(order) {
  const addr = order.shippingAddress || {};
  const addrLines = [
    addr.addr1, addr.addr2, addr.city && addr.state
      ? `${addr.city}, ${addr.state} ${addr.zip || ''}`.trim()
      : addr.city || '',
    addr.country,
  ].filter(Boolean).join('<br>');

  const itemsHtml = (order.items || []).map(item => {
    const texts = (item.textElements || []).filter(e => e.text);
    const textsHtml = texts.length ? `
      <div class="item-texts">
        <div class="item-texts-label">Custom text</div>
        ${texts.map(e => `<span class="text-chip">"${esc(e.text)}"${e.color ? ` <span style="font-size:10px;color:${esc(e.color)}">■</span>` : ''}</span>`).join('')}
      </div>` : '';

    const imgSrc = item.designUrl || item.thumbnailUrl || '';
    const imgHtml = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="design" onerror="this.parentNode.innerHTML='<div class=item-design-placeholder>No preview</div>'">`
      : `<div class="item-design-placeholder">No design image</div>`;

    return `<div class="item-card">
      <div class="item-top">
        <div class="item-design">${imgHtml}</div>
        <div class="item-meta">
          <div class="item-name">${esc(item.name || item.pid || '—')}</div>
          <div class="item-attrs">
            ${item.size  ? `Size: <strong>${esc(item.size)}</strong><br>` : ''}
            ${item.color ? `Color: <strong>${esc(item.color)}</strong><br>` : ''}
            Qty: <strong>${item.qty || 1}</strong>
          </div>
          <div class="item-price">$${((item.price || 0) * (item.qty || 1)).toFixed(2)}</div>
        </div>
      </div>
      ${textsHtml}
    </div>`;
  }).join('');

  const flagsHtml = (order.moderationFlags || []).map(f => `
    <div class="flag-card">
      <div class="flag-text">"${esc(f.text)}"</div>
      <div class="flag-detail">
        <span class="flag-cat">${esc(f.category || f.result)}</span>${esc(f.reason || '')}
      </div>
    </div>`).join('');

  const tsHtml = `
    <div class="ts-row"><span class="ts-label">Created</span><span class="ts-val">${fmtDate(order.createdAt, true)}</span></div>
    ${order.reviewedAt ? `<div class="ts-row"><span class="ts-label">Reviewed</span><span class="ts-val">${fmtDate(order.reviewedAt, true)}</span></div>` : ''}
    ${order.shippedAt  ? `<div class="ts-row"><span class="ts-label">Shipped</span><span class="ts-val">${fmtDate(order.shippedAt,  true)}</span></div>` : ''}
    ${order.printfulOrderId ? `<div class="ts-row"><span class="ts-label">Printful ID</span><span class="ts-val" style="font-family:monospace">${esc(String(order.printfulOrderId))}</span></div>` : ''}
    ${order.trackingUrl ? `<div class="ts-row"><span class="ts-label">Tracking</span><span class="ts-val"><a href="${esc(order.trackingUrl)}" target="_blank" rel="noopener">${esc(order.trackingUrl)}</a></span></div>` : ''}
    ${order.rejectionReason ? `<div class="ts-row"><span class="ts-label">Reason</span><span class="ts-val" style="color:#f87171">${esc(order.rejectionReason)}</span></div>` : ''}`;

  const actionsHtml = order.status === 'pending_review' ? `
    <div class="action-bar" id="action-bar-${esc(order.orderId)}">
      <div class="action-row">
        <button class="btn-approve" id="btn-approve-${esc(order.orderId)}" onclick="approveOrder('${esc(order.orderId)}')">✓ Approve &amp; Send to Printful</button>
        <button class="btn-reject"  id="btn-reject-${esc(order.orderId)}"  onclick="showRejectForm('${esc(order.orderId)}')">✕ Reject &amp; Refund</button>
      </div>
      <div class="reject-form" id="reject-form-${esc(order.orderId)}">
        <textarea id="reject-reason-${esc(order.orderId)}" placeholder="Reason for rejection (required — sent to customer)"></textarea>
        <div class="reject-form-btns">
          <button class="btn-reject" onclick="confirmReject('${esc(order.orderId)}')">Confirm Reject &amp; Refund</button>
          <button class="btn-ghost" onclick="hideRejectForm('${esc(order.orderId)}')">Cancel</button>
        </div>
      </div>
      <div id="action-result-${esc(order.orderId)}"></div>
    </div>` : `<div style="font-size:13px;color:#555;padding:12px 0">Order is ${statusLabel(order.status)} — no actions available.</div>`;

  document.getElementById('order-detail').innerHTML = `
    <div class="detail-inner">
      <div class="detail-header">
        <div>
          <div class="detail-id">${esc(order.orderId)}</div>
          <div class="detail-status"><span class="${statusPillClass(order.status)}">${statusLabel(order.status)}</span></div>
        </div>
        <div class="detail-date">${fmtDate(order.createdAt, true)}</div>
      </div>

      <div class="section">
        <div class="section-title">Customer</div>
        <div class="info-grid">
          <div class="info-cell">
            <div class="info-label">Name</div>
            <div class="info-val">${esc(order.customerName || '—')}</div>
          </div>
          <div class="info-cell">
            <div class="info-label">Email</div>
            <div class="info-val">${esc(order.customerEmail || '—')}</div>
          </div>
          <div class="info-cell" style="grid-column:1/-1">
            <div class="info-label">Shipping address</div>
            <div class="info-val">${addrLines || '—'}</div>
          </div>
        </div>
      </div>

      ${order.moderationFlags?.length ? `
      <div class="section">
        <div class="section-title" style="color:#f87171">⚑ Moderation Flags (${order.moderationFlags.length})</div>
        ${flagsHtml}
      </div>` : ''}

      <div class="section">
        <div class="section-title">Items</div>
        ${itemsHtml || '<div style="color:#444;font-size:13px">No items</div>'}
      </div>

      <div class="section">
        <div class="section-title">Order total</div>
        <div style="font-size:22px;font-weight:700;color:#fff">$${(order.total || 0).toFixed(2)}</div>
        ${order.shippingCost > 0 ? `<div style="font-size:12px;color:#666;margin-top:4px">incl. $${order.shippingCost.toFixed(2)} shipping</div>` : '<div style="font-size:12px;color:#666;margin-top:4px">Free shipping</div>'}
      </div>

      <div class="section">
        <div class="section-title">Timeline</div>
        ${tsHtml}
      </div>

      ${actionsHtml}
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function approveOrder(orderId) {
  if (!confirm('Approve this order and send to Printful?')) return;
  setActionBtns(orderId, true);
  const resultEl = document.getElementById(`action-result-${orderId}`);
  try {
    const res  = await fetch(`${API}/api/admin/orders/${encodeURIComponent(orderId)}/approve`, {
      method: 'POST', headers: { Authorization: `Bearer ${password}` },
    });
    const data = await res.json();
    if (res.ok) {
      resultEl.innerHTML = '<div class="action-result success">✓ Sent to Printful — order is now in production</div>';
      setTimeout(loadOrders, 1800);
    } else {
      resultEl.innerHTML = `<div class="action-result error">${esc(data.error || 'Failed')}</div>`;
      setActionBtns(orderId, false);
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="action-result error">${esc(e.message)}</div>`;
    setActionBtns(orderId, false);
  }
}

function showRejectForm(orderId) {
  document.getElementById(`reject-form-${orderId}`).style.display = 'block';
  document.getElementById(`btn-reject-${orderId}`).style.display  = 'none';
  document.getElementById(`reject-reason-${orderId}`).focus();
}

function hideRejectForm(orderId) {
  document.getElementById(`reject-form-${orderId}`).style.display = 'block';
  document.getElementById(`reject-form-${orderId}`).style.display = 'none';
  document.getElementById(`btn-reject-${orderId}`).style.display  = '';
}

async function confirmReject(orderId) {
  const reason = document.getElementById(`reject-reason-${orderId}`).value.trim();
  if (!reason) {
    document.getElementById(`reject-reason-${orderId}`).focus();
    document.getElementById(`reject-reason-${orderId}`).style.borderColor = '#f87171';
    return;
  }
  if (!confirm('Reject this order and issue a full refund? This cannot be undone.')) return;
  setActionBtns(orderId, true);
  const resultEl = document.getElementById(`action-result-${orderId}`);
  try {
    const res  = await fetch(`${API}/api/admin/orders/${encodeURIComponent(orderId)}/reject`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${password}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason }),
    });
    const data = await res.json();
    if (res.ok) {
      resultEl.innerHTML = '<div class="action-result success">✓ Refunded — customer notified by email</div>';
      setTimeout(loadOrders, 1800);
    } else {
      resultEl.innerHTML = `<div class="action-result error">${esc(data.error || 'Failed')}</div>`;
      setActionBtns(orderId, false);
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="action-result error">${esc(e.message)}</div>`;
    setActionBtns(orderId, false);
  }
}

function setActionBtns(orderId, disabled) {
  ['btn-approve', 'btn-reject'].forEach(pfx => {
    const el = document.getElementById(`${pfx}-${orderId}`);
    if (el) el.disabled = disabled;
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function statusPillClass(s) {
  return `pill pill-${s || 'pending_review'}`;
}

function statusLabel(s) {
  return { pending_review: 'Pending Review', in_production: 'In Production', rejected: 'Rejected', shipped: 'Shipped' }[s] || s || '—';
}

function fmtDate(iso, long) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (long) return d.toLocaleString();
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const stored = sessionStorage.getItem('admin_pw');
if (stored) { password = stored; loadOrders(); }
</script>
