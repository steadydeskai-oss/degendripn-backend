<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DegenDrip Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f14;color:#e0e0e0;min-height:100vh}
  a{color:#60b0ff}

  /* Login */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:36px 40px;width:340px}
  .login-box h1{font-size:20px;margin-bottom:8px;color:#fff}
  .login-box p{font-size:13px;color:#888;margin-bottom:24px}
  .login-box input{width:100%;padding:10px 12px;border:1px solid #2a2a3a;border-radius:7px;background:#111;color:#fff;font-size:14px;margin-bottom:12px;outline:none}
  .login-box input:focus{border-color:#4a7fff}
  .btn{display:inline-block;padding:10px 20px;border:none;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s}
  .btn-primary{background:#4a7fff;color:#fff;width:100%}
  .btn-primary:hover{opacity:.85}
  .btn-approve{background:#1a7a3a;color:#aaffbb;border:1px solid #2a9a4a;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
  .btn-approve:hover{background:#1f9044}
  .btn-reject{background:#5a1a1a;color:#ffaaaa;border:1px solid #8a2a2a;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
  .btn-reject:hover{background:#731f1f}
  .btn-approve:disabled,.btn-reject:disabled{opacity:.4;cursor:default}
  #login-error{color:#ff7070;font-size:12px;margin-top:8px;display:none}

  /* Main */
  #main-screen{display:none;max-width:1100px;margin:0 auto;padding:24px 20px}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #2a2a3a}
  .top-bar h1{font-size:20px;color:#fff}
  .top-bar-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#888}
  #refresh-status{font-size:12px;color:#666}

  /* Orders */
  .no-orders{text-align:center;padding:60px;color:#555;font-size:15px}
  .order-card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;margin-bottom:16px;overflow:hidden}
  .order-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#1e1e2a;border-bottom:1px solid #2a2a3a;gap:12px;flex-wrap:wrap}
  .order-id{font-size:12px;font-family:monospace;color:#888}
  .order-email{font-weight:600;font-size:14px;color:#ddd}
  .order-date{font-size:12px;color:#666}
  .order-body{padding:16px 18px;display:flex;gap:20px;flex-wrap:wrap}
  .order-items{flex:1;min-width:220px}
  .order-items h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px}
  .item-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .item-thumb{width:52px;height:52px;border-radius:7px;object-fit:cover;background:#111;flex-shrink:0;border:1px solid #2a2a3a}
  .item-thumb-placeholder{width:52px;height:52px;border-radius:7px;background:#1a1a2e;flex-shrink:0;border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;text-align:center}
  .item-info{font-size:13px}
  .item-info strong{display:block;color:#ccc}
  .item-info span{color:#888;font-size:11px}
  .order-flags{flex:1;min-width:220px}
  .order-flags h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px}
  .flag-row{background:#1c1416;border:1px solid #3a2020;border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .flag-text{color:#ffaaaa;font-weight:600;word-break:break-word;margin-bottom:4px}
  .flag-reason{color:#996666;font-size:11px}
  .flag-category{display:inline-block;background:#3a2020;color:#ff9090;font-size:10px;font-family:monospace;padding:2px 6px;border-radius:4px;margin-right:6px}
  .order-actions{display:flex;align-items:flex-end;flex-direction:column;gap:8px;justify-content:center;padding:4px 0}
  .action-result{font-size:11px;padding:4px 8px;border-radius:5px;margin-top:4px;text-align:center}
  .action-result.success{background:#1a3a20;color:#88ffaa;border:1px solid #2a6a30}
  .action-result.error{background:#3a1a1a;color:#ff9090;border:1px solid #6a2a2a}

  .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .pill-pending{background:#2a2010;color:#ffcc44;border:1px solid #4a3a10}
  .pill-approved{background:#102a18;color:#44ff88;border:1px solid #1a5a28}
  .pill-rejected{background:#2a1010;color:#ff6666;border:1px solid #5a1a1a}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>DegenDrip Admin</h1>
    <p>Content moderation dashboard</p>
    <input type="password" id="pw-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
    <div id="login-error">Incorrect password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="main-screen">
  <div class="top-bar">
    <h1>Pending Orders <span id="pending-count" style="font-size:14px;color:#888;font-weight:400"></span></h1>
    <div class="top-bar-right">
      <span id="refresh-status"></span>
      <button class="btn btn-primary" style="width:auto;padding:7px 16px;font-size:13px" onclick="loadOrders()">↻ Refresh</button>
      <button class="btn" style="background:#222;color:#aaa;border:1px solid #333;padding:7px 14px;font-size:13px" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="orders-container"><p class="no-orders">Loading…</p></div>
</div>

<script>
const API = window.location.origin;
let password = '';
let refreshTimer = null;
let refreshCountdown = 60;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  password = pw;
  sessionStorage.setItem('admin_pw', pw);
  loadOrders();
}

function logout() {
  sessionStorage.removeItem('admin_pw');
  password = '';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  clearInterval(refreshTimer);
}

async function loadOrders() {
  try {
    const res = await fetch(`${API}/api/admin/pending-orders`, {
      headers: { Authorization: `Bearer ${password}` },
    });
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    if (!res.ok) throw new Error('Server error ' + res.status);

    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';

    const orders = await res.json();
    renderOrders(orders);
    startRefreshTimer();
  } catch (e) {
    const container = document.getElementById('orders-container');
    if (container) container.innerHTML = `<p class="no-orders" style="color:#ff7070">Error: ${e.message}</p>`;
  }
}

function startRefreshTimer() {
  clearInterval(refreshTimer);
  refreshCountdown = 60;
  refreshTimer = setInterval(() => {
    refreshCountdown--;
    const el = document.getElementById('refresh-status');
    if (el) el.textContent = `Auto-refresh in ${refreshCountdown}s`;
    if (refreshCountdown <= 0) loadOrders();
  }, 1000);
}

function renderOrders(orders) {
  const pending = orders.filter(o => o.status === 'pending');
  const others  = orders.filter(o => o.status !== 'pending');
  const all = [...pending, ...others];

  document.getElementById('pending-count').textContent =
    pending.length ? `(${pending.length} awaiting review)` : '(none pending)';

  const container = document.getElementById('orders-container');
  if (all.length === 0) {
    container.innerHTML = '<p class="no-orders">No orders to review — all clear ✓</p>';
    return;
  }

  container.innerHTML = all.map(order => {
    const date = new Date(order.createdAt).toLocaleString();
    const statusPill = {
      pending:  '<span class="pill pill-pending">Pending</span>',
      approved: '<span class="pill pill-approved">Approved</span>',
      rejected: '<span class="pill pill-rejected">Rejected</span>',
    }[order.status] || '';

    const items = (order.cart || []).map(item => {
      const thumb = item.thumbnailUrl
        ? `<img class="item-thumb" src="${escHtml(item.thumbnailUrl)}" alt="">`
        : `<div class="item-thumb-placeholder">${escHtml(item.pid||'?')}</div>`;
      const textNote = (item.textElements||[]).filter(e=>e.text).map(e=>
        `<span style="color:#cc9955;font-size:10px">"${escHtml(e.text)}"</span>`
      ).join(', ');
      return `<div class="item-row">
        ${thumb}
        <div class="item-info">
          <strong>${escHtml(item.name||item.pid)}</strong>
          <span>${escHtml(item.size||'')}${item.color?` · ${escHtml(item.color)}`:''}${item.qty>1?` × ${item.qty}`:''}</span>
          ${textNote ? `<div style="margin-top:3px">${textNote}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    const flags = (order.moderationFlags || []).map(f => {
      const label = f.result === 'review' ? `<span class="flag-category">${escHtml(f.category)}</span>` : '';
      return `<div class="flag-row">
        <div class="flag-text">"${escHtml(f.text)}"</div>
        <div class="flag-reason">${label}${escHtml(f.reason||f.category||'')}</div>
      </div>`;
    }).join('');

    const isPending = order.status === 'pending';

    return `<div class="order-card" id="order-${escHtml(order.id)}">
      <div class="order-header">
        <div>
          <div class="order-email">${escHtml(order.shipping?.email||'—')}</div>
          <div class="order-id">${escHtml(order.id)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${statusPill}
          <span class="order-date">${escHtml(date)}</span>
        </div>
      </div>
      <div class="order-body">
        <div class="order-items">
          <h3>Items</h3>
          ${items || '<span style="color:#555;font-size:13px">No items</span>'}
        </div>
        <div class="order-flags">
          <h3>Flagged content</h3>
          ${flags || '<span style="color:#555;font-size:13px">—</span>'}
        </div>
        <div class="order-actions">
          ${isPending ? `
            <button class="btn-approve" onclick="approveOrder('${escHtml(order.id)}', this)">✓ Approve &amp; Send to Printful</button>
            <button class="btn-reject"  onclick="rejectOrder('${escHtml(order.id)}', this)">✕ Reject &amp; Refund</button>
          ` : `<span style="font-size:12px;color:#555">Already ${escHtml(order.status)}</span>`}
          <div id="result-${escHtml(order.id)}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function approveOrder(id, btn) {
  if (!confirm('Approve this order and send to Printful?')) return;
  btn.disabled = true;
  btn.closest('.order-actions').querySelector('.btn-reject').disabled = true;
  const resultEl = document.getElementById(`result-${id}`);
  try {
    const res = await fetch(`${API}/api/admin/approve-order/${encodeURIComponent(id)}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${password}` },
    });
    const data = await res.json();
    if (res.ok) {
      resultEl.innerHTML = '<div class="action-result success">Sent to Printful ✓</div>';
      setTimeout(loadOrders, 1500);
    } else {
      resultEl.innerHTML = `<div class="action-result error">${escHtml(data.error||'Failed')}</div>`;
      btn.disabled = false;
      btn.closest('.order-actions').querySelector('.btn-reject').disabled = false;
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="action-result error">${escHtml(e.message)}</div>`;
    btn.disabled = false;
  }
}

async function rejectOrder(id, btn) {
  if (!confirm('Reject this order and issue a full Stripe refund?')) return;
  btn.disabled = true;
  btn.closest('.order-actions').querySelector('.btn-approve').disabled = true;
  const resultEl = document.getElementById(`result-${id}`);
  try {
    const res = await fetch(`${API}/api/admin/reject-order/${encodeURIComponent(id)}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${password}` },
    });
    const data = await res.json();
    if (res.ok) {
      resultEl.innerHTML = '<div class="action-result success">Refunded ✓</div>';
      setTimeout(loadOrders, 1500);
    } else {
      resultEl.innerHTML = `<div class="action-result error">${escHtml(data.error||'Failed')}</div>`;
      btn.disabled = false;
      btn.closest('.order-actions').querySelector('.btn-approve').disabled = false;
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="action-result error">${escHtml(e.message)}</div>`;
    btn.disabled = false;
  }
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Auto-login from sessionStorage
const stored = sessionStorage.getItem('admin_pw');
if (stored) { password = stored; loadOrders(); }
</script>
</body>
</html>
